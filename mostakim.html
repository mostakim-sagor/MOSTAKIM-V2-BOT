<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOSTAKIM-V2-BOT-DASBOARD</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* ══════════════════════════════
       LOADING SCREEN
    ══════════════════════════════ */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    #loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    /* Triple orbital rings */
    .loader-orbit {
      position: relative;
      width: 84px;
      height: 84px;
    }
    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
    }
    .ring1 {
      border-top-color: #ff6fd8;
      border-right-color: #ff6fd8;
      animation: spin 1s linear infinite;
    }
    .ring2 {
      inset: 12px;
      border-bottom-color: #a78bfa;
      border-left-color: #a78bfa;
      animation: spin 0.7s linear infinite reverse;
    }
    .ring3 {
      inset: 24px;
      border-top-color: #00c6ff;
      animation: spin 0.45s linear infinite;
    }
    .loader-dot {
      position: absolute;
      inset: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6fd8, #00c6ff);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { transform: scale(0.75); opacity: 0.6; }
      50%       { transform: scale(1.2);  opacity: 1;   }
    }

    /* Progress bar */
    .loader-bar-wrap {
      width: 160px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff6fd8, #a78bfa, #00c6ff);
      border-radius: 99px;
      animation: loadBar 1.9s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes loadBar {
      0%   { width: 0%;   }
      60%  { width: 78%;  }
      100% { width: 100%; }
    }

    .loader-text {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      animation: textBlink 1.2s ease-in-out infinite;
    }
    @keyframes textBlink {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 1;    }
    }

    /* ══════════════════════════════
       BACKGROUND BLOBS
    ══════════════════════════════ */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: blobMove 8s ease-in-out infinite alternate;
      z-index: 0;
    }
    .blob1 { width: 400px; height: 400px; background: #ff6fd8; top: -100px; left: -100px; animation-delay: 0s; }
    .blob2 { width: 350px; height: 350px; background: #3813c2; bottom: -80px; right: -80px; animation-delay: 2s; }
    .blob3 { width: 300px; height: 300px; background: #00c6ff; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 4s; }
    @keyframes blobMove {
      0%   { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.15) translate(30px, -30px); }
    }

    /* ══════════════════════════════
       CARD
    ══════════════════════════════ */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 48px 40px 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 2s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════
       AVATAR — PERFECT ROUND FIX
    ══════════════════════════════ */
    .avatar-wrap {
      position: relative;
      width: 116px;
      height: 116px;
      margin: 0 auto 20px;
    }

    /* Animated gradient border ring */
    .avatar-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #ff6fd8, #3813c2, #00c6ff, #ff6fd8);
      background-size: 300% 300%;
      animation: spinGrad 4s linear infinite;
      z-index: 2;
      pointer-events: none;
      /* Mask trick to show only the border */
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    @keyframes spinGrad {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }

    /* Perfect circle image container */
    .avatar-img {
      position: absolute;
      inset: 3px;           /* matches ring padding */
      border-radius: 50%;
      overflow: hidden;
      background: #1a1a2e;
      z-index: 1;
    }
    .avatar-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* Name */
    .name {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #ff6fd8, #a78bfa, #00c6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .tagline {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      margin-bottom: 28px;
    }

    /* ══════════════════════════════
       SOCIAL BUTTONS — APP ICON STYLE
    ══════════════════════════════ */
    .socials {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 22px;
    }
    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #fff;
      background: none;
      border: none;
      cursor: pointer;
    }
    .btn-icon {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0);
      transition: background 0.18s;
    }
    .btn:hover .btn-icon { transform: translateY(-5px) scale(1.1); box-shadow: 0 16px 32px rgba(0,0,0,0.5); }
    .btn:hover .btn-icon::after { background: rgba(255,255,255,0.12); }
    .btn:active .btn-icon { transform: scale(0.94); }
    .btn-icon svg { width: 26px; height: 26px; fill: #fff; position: relative; z-index: 1; }
    .btn-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.03em;
    }

    .btn-fb  .btn-icon { background: linear-gradient(145deg, #1a4fa0, #1877f2); }
    .btn-msg .btn-icon { background: linear-gradient(145deg, #0066cc, #00b0ff); }
    .btn-ig  .btn-icon { background: linear-gradient(145deg, #6a1fa0, #e1306c, #f77737); }
    .btn-yt  .btn-icon { background: linear-gradient(145deg, #8b0000, #ff0000); }

    .footer {
      margin-top: 28px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
    }
  </style>
</head>
